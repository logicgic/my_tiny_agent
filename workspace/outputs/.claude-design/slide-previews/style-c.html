<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风格预览 C - 渐变活力</title>
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,700&f[]=neue-montreal@400,500,700">
    <style>
        :root {
            --bg-primary: #0d0d1a;
            --gradient-1: #7c3aed;
            --gradient-2: #db2777;
            --gradient-3: #f59e0b;
            --text-primary: #ffffff;
            --text-secondary: #b8b8d0;
            --accent: #a78bfa;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.1);
            --font-display: 'Neue Montreal', sans-serif;
            --font-body: 'Switzer', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .slide {
            width: 100%;
            max-width: 1200px;
            padding: 4rem;
            position: relative;
        }

        .gradient-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            z-index: -1;
        }

        .gradient-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 8s ease-in-out infinite;
        }

        .gradient-blob:nth-child(1) {
            width: 500px;
            height: 500px;
            background: var(--gradient-1);
            top: -200px;
            right: -100px;
            animation-delay: 0s;
        }

        .gradient-blob:nth-child(2) {
            width: 400px;
            height: 400px;
            background: var(--gradient-2);
            bottom: -150px;
            left: -100px;
            animation-delay: 2s;
        }

        .gradient-blob:nth-child(3) {
            width: 300px;
            height: 300px;
            background: var(--gradient-3);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(20px, -30px) scale(1.05); }
            50% { transform: translate(-15px, 20px) scale(0.95); }
            75% { transform: translate(25px, 15px) scale(1.02); }
        }

        .label {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-size: 0.875rem;
            border: 1px solid var(--card-border);
        }

        h1 {
            font-family: var(--font-display);
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s ease-out 0.2s forwards;
            background: linear-gradient(135deg, var(--gradient-1) 0%, var(--gradient-2) 50%, var(--gradient-3) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.5rem;
            color: var(--text-secondary);
            margin-bottom: 3rem;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s ease-out 0.4s forwards;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-top: 3rem;
        }

        .feature-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s ease-out forwards;
            position: relative;
            overflow: hidden;
        }

        .feature-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gradient-1), var(--gradient-2), var(--gradient-3));
            opacity: 0;
            animation: expandLine 0.6s ease-out forwards;
        }

        .feature-card:nth-child(1)::before { animation-delay: 0.6s; }
        .feature-card:nth-child(2)::before { animation-delay: 0.7s; }
        .feature-card:nth-child(3)::before { animation-delay: 0.8s; }

        .feature-card:nth-child(1) { animation-delay: 0.6s; }
        .feature-card:nth-child(2) { animation-delay: 0.7s; }
        .feature-card:nth-child(3) { animation-delay: 0.8s; }

        @keyframes expandLine {
            to { opacity: 1; }
        }

        .feature-card h3 {
            font-family: var(--font-display);
            font-size: 1.25rem;
            margin-bottom: 0.75rem;
            background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .feature-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .style-indicator {
            position: fixed;
            bottom: 30px;
            right: 30px;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="label">🎨 风格 C: 渐变活力</div>
    
    <div class="gradient-bg">
        <div class="gradient-blob"></div>
        <div class="gradient-blob"></div>
        <div class="gradient-blob"></div>
    </div>

    <div class="slide">
        <h1>如何构建一个 Agent</h1>
        <p class="subtitle">从零开始打造智能代理系统</p>
        
        <div class="features">
            <div class="feature-card">
                <h3>🌈 活力设计</h3>
                <p>紫色到粉色到橙色的渐变，充满创新活力和现代感</p>
            </div>
            <div class="feature-card">
                <h3>✨ 动态效果</h3>
                <p>流动的渐变背景和毛玻璃效果，营造沉浸式体验</p>
            </div>
            <div class="feature-card">
                <h3>🚀 前沿风格</h3>
                <p大胆的配色和动效，适合展示创新和未来主题</p>
            </div>
        </div>
    </div>

    <div class="style-indicator">Style Preview C — Gradient Energy</div>
</body>
</html>
