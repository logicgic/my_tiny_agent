<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风格预览 B - 温暖专业</title>
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=instrument-sans@400,500,600">
    <style>
        :root {
            --bg-primary: #faf9f7;
            --bg-accent: #f0ede9;
            --text-primary: #1a1a1a;
            --text-secondary: #5a5a5a;
            --accent: #d4694e;
            --accent-light: #f4a994;
            --card-bg: #ffffff;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --font-display: 'Instrument Sans', sans-serif;
            --font-body: 'General Sans', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .slide {
            width: 100%;
            max-width: 1200px;
            padding: 4rem;
            position: relative;
        }

        .slide::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, var(--accent-light) 0%, transparent 70%);
            opacity: 0.3;
            border-radius: 50%;
            filter: blur(60px);
        }

        .label {
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--card-bg);
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-size: 0.875rem;
            box-shadow: var(--shadow);
        }

        h1 {
            font-family: var(--font-display);
            font-size: 4rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s ease-out 0.2s forwards;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 1.5rem;
            color: var(--text-secondary);
            margin-bottom: 3rem;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s ease-out 0.4s forwards;
            font-weight: 400;
        }

        .accent-line {
            width: 80px;
            height: 4px;
            background: var(--accent);
            margin-bottom: 2rem;
            opacity: 0;
            transform: scaleX(0);
            transform-origin: left;
            animation: expandLine 0.8s ease-out 0.3s forwards;
        }

        @keyframes expandLine {
            to {
                opacity: 1;
                transform: scaleX(1);
            }
        }

        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-top: 3rem;
        }

        .feature-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: var(--shadow);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s ease-out forwards;
            border-left: 4px solid var(--accent);
        }

        .feature-card:nth-child(1) { animation-delay: 0.6s; }
        .feature-card:nth-child(2) { animation-delay: 0.7s; }
        .feature-card:nth-child(3) { animation-delay: 0.8s; }

        .feature-card h3 {
            font-family: var(--font-display);
            font-size: 1.25rem;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
            font-weight: 600;
        }

        .feature-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .style-indicator {
            position: fixed;
            bottom: 30px;
            right: 30px;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="label">🎨 风格 B: 温暖专业</div>
    
    <div class="slide">
        <div class="accent-line"></div>
        <h1>如何构建一个 Agent</h1>
        <p class="subtitle">从零开始打造智能代理系统</p>
        
        <div class="features">
            <div class="feature-card">
                <h3>📐 专业设计</h3>
                <p>浅色主题搭配温暖橙色强调，适合正式场合和专业演示</p>
            </div>
            <div class="feature-card">
                <h3>📖 易读性强</h3>
                <p>高对比度配色，确保内容清晰可读，适合长时间观看</p>
            </div>
            <div class="feature-card">
                <h3>🎨 优雅细节</h3>
                <p>精致的卡片设计和阴影效果，提升整体视觉品质</p>
            </div>
        </div>
    </div>

    <div class="style-indicator">Style Preview B — Warm Professional</div>
</body>
</html>
